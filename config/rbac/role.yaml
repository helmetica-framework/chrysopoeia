---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions/finalizers
  verbs:
  - update
- apiGroups:
  - chrysopoeia.io
  resources:
  - customresourcedefinitionsources
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - chrysopoeia.io
  resources:
  - customresourcedefinitionsources/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - helm.toolkit.fluxcd.io
  resources:
  - helmreleases
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - helmetica.io
  resources:
  - instancerevisions
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - helmetica.io
  resources:
  - instancerevisions/status
  verbs:

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: instances.v6.podinfo.bundles.appcat.io
spec:
  group: v6.podinfo.bundles.appcat.io
  names:
    kind: Instance
    plural: instances
  scope: Namespaced
  versions:
  - name: bundle
    schema:
      openAPIV3Schema:
        properties:
          spec:
            description: Configures the desired state of the service.
            properties:
              desiredRevision:
                description: The desired revision of the service.
                type: string
              values:
                description: This field together with the `.spec.version` field defines
                  the configuration of the service. Every change to either of these
                  two fields creates a new revision of the service.
                properties:
                  affinity:
                    type: object
                  backend:
                    nullable: true
                    type: string
                  backends:
                    items:
                      type: string
                    type: array
                  cache:
                    description: Redis address in the format tcp://<host>:<port>
                    type: string
                  certificate:
                    description: create a certificate manager certificate (cert-manager
                      required)
                    properties:
                      create:
                        type: boolean
                      dnsNames:
                        description: the hostname / subject alternative names for
                          the certificate
                        items:
                          type: string
                        type: array
                      issuerRef:
                        description: the issuer used to issue the certificate
                        properties:
                          kind:
                            type: string
                          name:
                            type: string
                        type: object
                    type: object
                  config:
                    description: config file settings
                    properties:
                      name:
                        description: config file name
                        type: string
                      path:
                        description: config file path
                        type: string
                    type: object
                  extraArgs:
                    description: Additional command line arguments to pass to podinfo
                      container
                    items:
                      type: string
                    type: array
                  extraEnvs:
                    description: Extra environment variables for the podinfo container
                    items:
                      type: string
                    type: array
                  faults:
                    description: failure conditions
                    properties:
                      delay:
                        type: boolean
                      error:
                        type: boolean
                      testFail:
                        type: boolean
                      testTimeout:
                        type: boolean
                      unhealthy:
                        type: boolean
                      unready:
                        type: boolean
                    type: object
                  grpcRoute:
                    description: |-
                      -- Expose the gRPC service via Gateway GRPCRoute
                      Requires a Gateway controller with GRPCRoute support
                      Docs https://gateway-api.sigs.k8s.io/guides/grpc-routing/
                    properties:
                      additionalLabels:
                        description: Add additional labels to the GRPCRoute.
                        type: object
                      annotations:
                        description: GRPCRoute annotations.
                        type: object
                      enabled:
                        description: GRPCRoute enabled.
                        type: boolean
                      hostnames:
                        description: Hostnames matching HTTP header.
                        items:
                          type: string
                        type: array
                      parentRefs:
                        description: Which Gateways this Route is attached to.
                        items:
                          properties:
                            name:
                              type: string
                            sectionName:
                              type: string
                          type: object
                        type: array
                      rules:
                        description: List of rules applied.
                        items:
                          type: object
                        type: array
                    type: object
                  h2c:
                    description: enable h2c protocol (non-TLS version of HTTP/2)
                    properties:
                      enabled:
                        type: boolean
                    type: object
                  hooks:
                    description: Helm hooks (for testing purposes)
                    properties:
                      postDelete:
                        properties:
                          job:
                            properties:
                              enabled:
                                type: boolean
                              exitCode:
                                type: integer
                              hookDeletePolicy:
                                type: string
                              sleepSeconds:
                                nullable: true
                                type: string
                              ttlSecondsAfterFinished:
                                nullable: true
                                type: string
                            type: object
                        type: object
                      postInstall:
                        properties:
                          job:
                            properties:
                              enabled:
                                type: boolean
                              exitCode:
                                type: integer
                              hookDeletePolicy:
                                type: string
                              sleepSeconds:
                                nullable: true
                                type: string
                              ttlSecondsAfterFinished:
                                nullable: true
                                type: string
                            type: object
                        type: object
                      postRollback:
                        properties:
                          job:
                            properties:
                              enabled:
                                type: boolean
                              exitCode:
                                type: integer
                              hookDeletePolicy:
                                type: string
                              sleepSeconds:
                                nullable: true
                                type: string
                              ttlSecondsAfterFinished:
                                nullable: true
                                type: string
                            type: object
                        type: object
                      postUpgrade:
                        properties:
                          job:
                            properties:
                              enabled:
                                type: boolean
                              exitCode:
                                type: integer
                              hookDeletePolicy:
                                type: string
                              sleepSeconds:
                                nullable: true
                                type: string
                              ttlSecondsAfterFinished:
                                nullable: true
                                type: string
                            type: object
                        type: object
                      preDelete:
                        properties:
                          job:
                            properties:
                              enabled:
                                type: boolean
                              exitCode:
                                type: integer
                              hookDeletePolicy:
                                type: string
                              sleepSeconds:
                                nullable: true
                                type: string
                              ttlSecondsAfterFinished:
                                nullable: true
                                type: string
                            type: object
                        type: object
                      preInstall:
                        properties:
                          job:
                            properties:
                              enabled:
                                type: boolean
                              exitCode:
                                type: integer
                              hookDeletePolicy:
                                type: string
                              sleepSeconds:
                                nullable: true
                                type: string
                              ttlSecondsAfterFinished:
                                nullable: true
                                type: string
                            type: object
                        type: object
                      preRollback:
                        properties:
                          job:
                            properties:
                              enabled:
                                type: boolean
                              exitCode:
                                type: integer
                              hookDeletePolicy:
                                type: string
                              sleepSeconds:
                                nullable: true
                                type: string
                              ttlSecondsAfterFinished:
                                nullable: true
                                type: string
                            type: object
                        type: object
                      preUpgrade:
                        properties:
                          job:
                            properties:
                              enabled:
                                type: boolean
                              exitCode:
                                type: integer
                              hookDeletePolicy:
                                type: string
                              sleepSeconds:
                                nullable: true
                                type: string
                              ttlSecondsAfterFinished:
                                nullable: true
                                type: string
                            type: object
                        type: object
                    type: object
                  host:
                    nullable: true
                    type: string
                  hpa:
                    description: metrics-server add-on required
                    properties:
                      cpu:
                        description: average total CPU usage per pod (1-100)
                        nullable: true
                        type: string
                      enabled:
                        type: boolean
                      maxReplicas:
                        type: integer
                      memory:
                        description: average memory usage per pod (100Mi-1Gi)
                        nullable: true
                        type: string
                      requests:
                        description: average http requests per second per pod (k8s-prometheus-adapter)
                        nullable: true
                        type: string
                    type: object
                  httpRoute:
                    description: |-
                      -- Expose the service via Gateway HTTPRoute
                      Requires a Gateway controller
                      Docs https://gateway-api.sigs.k8s.io/guides/
                    properties:
                      additionalLabels:
                        description: Add additional labels to the HTTPRoute.
                        type: object
                      annotations:
                        description: HTTPRoute annotations.
                        type: object
                      enabled:
                        description: HTTPRoute enabled.
                        type: boolean
                      hostnames:
                        description: Hostnames matching HTTP header.
                        items:
                          type: string
                        type: array
                      parentRefs:
                        description: Which Gateways this Route is attached to.
                        items:
                          properties:
                            name:
                              type: string
                            sectionName:
                              type: string
                          type: object
                        type: array
                      rules:
                        description: List of rules and filters applied.
                        items:
                          properties:
                            matches:
                              items:
                                properties:
                                  path:
                                    properties:
                                      type:
                                        type: string
                                      value:
                                        type: string
                                    type: object
                                type: object
                              type: array
                          type: object
                        type: array
                    type: object
                  image:
                    properties:
                      pullPolicy:
                        type: string
                      pullSecrets:
                        items:
                          type: string
                        type: array
                      repository:
                        type: string
                      tag:
                        type: string
                    type: object
                  ingress:
                    description: |-
                      -- Expose the service via Kubernetes Ingress
                      Requires an Ingress controller
                      Docs https://kubernetes.io/docs/concepts/services-networking/ingress/
                    properties:
                      additionalLabels:
                        type: object
                      annotations:
                        type: object
                      className:
                        type: string
                      enabled:
                        type: boolean
                      hosts:
                        description: |-
                          kubernetes.io/ingress.class: nginx
                          kubernetes.io/tls-acme: "true"
                        items:
                          properties:
                            host:
                              type: string
                            paths:
                              items:
                                properties:
                                  path:
                                    type: string
                                  pathType:
                                    type: string
                                type: object
                              type: array
                          type: object
                        type: array
                      tls:
                        items:
                          type: string
                        type: array
                    type: object
                  logLevel:
                    type: string
                  nodeSelector:
                    type: object
                  podAnnotations:
                    type: object
                  podDisruptionBudget:
                    description: Disruption budget will be configured only when the
                      replicaCount is greater than 1
                    type: object
                  podSecurityContext:
                    description: set pod security context
                    type: object
                  prefix:
                    type: string
                  priorityClassName:
                    type: string
                  probes:
                    description: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle#container-probes
                    properties:
                      liveness:
                        properties:
                          failureThreshold:
                            type: integer
                          initialDelaySeconds:
                            type: integer
                          periodSeconds:
                            type: integer
                          successThreshold:
                            type: integer
                          timeoutSeconds:
                            type: integer
                        type: object
                      readiness:
                        properties:
                          failureThreshold:
                            type: integer
                          initialDelaySeconds:
                            type: integer
                          periodSeconds:
                            type: integer
                          successThreshold:
                            type: integer
                          timeoutSeconds:
                            type: integer
                        type: object
                      startup:
                        properties:
                          enable:
                            type: boolean
                          failureThreshold:
                            type: integer
                          initialDelaySeconds:
                            type: integer
                          periodSeconds:
                            type: integer
                          successThreshold:
                            type: integer
                          timeoutSeconds:
                            type: integer
                        type: object
                    type: object
                  redis:
                    description: Redis deployment
                    properties:
                      enabled:
                        type: boolean
                      imagePullSecrets:
                        items:
                          type: string
                        type: array
                      repository:
                        type: string
                      tag:
                        type: string
                    type: object
                  replicaCount:
                    type: integer
                  resources:
                    properties:
                      limits:
                        nullable: true
                        type: string
                      requests:
                        properties:
                          cpu:
                            type: string
                          memory:
                            type: string
                        type: object
                    type: object
                  securityContext:
                    description: set container security context
                    type: object
                  service:
                    description: Kubernetes Service settings
                    properties:
                      additionalLabels:
                        type: object
                      annotations:
                        type: object
                      enabled:
                        type: boolean
                      externalPort:
                        type: integer
                      externalTrafficPolicy:
                        type: string
                      grpcPort:
                        type: integer
                      grpcService:
                        type: string
                      hostPort:
                        description: |-
                          the port used to bind the http port to the host
                          NOTE: requires privileged container with NET_BIND_SERVICE capability -- this is useful for testing
                          in local clusters such as kind without port forwarding
                        nullable: true
                        type: string
                      httpPort:
                        type: integer
                      metricsPort:
                        type: integer
                      nodePort:
                        type: integer
                      trafficDistribution:
                        description: Stable from Kubernetes v1.33+ with a value of
                          PreferClose. Additional values are PreferSameZone and PreferSameNode
                          from v1.34+. Empty string means it's disabled.
                        type: string
                      type:
                        type: string
                    type: object
                  serviceAccount:
                    properties:
                      enabled:
                        description: Specifies whether a service account should be
                          created
                        type: boolean
                      imagePullSecrets:
                        description: List of image pull secrets if pulling from private
                          registries
                        items:
                          type: string
                        type: array
                      name:
                        description: |-
                          The name of the service account to use.
                          If not set and create is true, a name is generated using the fullname template
                        nullable: true
                        type: string
                    type: object
                  serviceMonitor:
                    description: create Prometheus Operator monitor
                    properties:
                      additionalLabels:
                        type: object
                      enabled:
                        type: boolean
                      interval:
                        type: string
                    type: object
                  tls:
                    description: enable tls on the podinfo service
                    properties:
                      certPath:
                        description: the path where the certificate key pair will
                          be mounted
                        type: string
                      enabled:
                        type: boolean
                      hostPort:
                        description: |-
                          the port used to bind the tls port to the host
                          NOTE: requires privileged container with NET_BIND_SERVICE capability -- this is useful for testing
                          in local clusters such as kind without port forwarding
                        nullable: true
                        type: string
                      port:
                        description: the port used to host the tls endpoint on the
                          service
                        type: integer
                      secretName:
                        description: the name of the secret used to mount the certificate
                          key pair
                        nullable: true
                        type: string
                    type: object
                  tolerations:
                    items:
                      type: string
                    type: array
                  topologySpreadConstraints:
                    description: https://kubernetes.io/docs/concepts/workloads/pods/pod-topology-spread-constraints/
                    items:
                      type: string
                    type: array
                  ui:
                    properties:
                      color:
                        type: string
                      logo:
                        type: string
                      message:
                        type: string
                    type: object
                type: object
              version:
                description: The version of the service. Every change to this field
                  together with the `.spec.values` field creates a new revision of
                  the service.
                type: string
            type: object
        type: object
    served: true
    storage: true
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null


apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: instances.v6.podinfo.bundles.appcat.io
spec:
  group: v6.podinfo.bundles.appcat.io
  names:
    kind: Instance
    plural: instances
  scope: Namespaced
  versions:
  - name: bundle
    schema:
      openAPIV3Schema:
        properties:
          spec:
            description: Configures the desired state of the service.
            properties:
              desiredRevision:
                description: The desired revision of the service.
                type: string
              values:
                description: This field together with the `.spec.version` field defines
                  the configuration of the service. Every change to either of these
                  two fields creates a new revision of the service.
                properties:
                  affinity:
                    type: object
                  backend:
                    nullable: true
                    type: string
                  backends:
                    items:
                      type: string
                    type: array
                  cache:
                    description: Redis address in the format <host>:<port>
                    type: string
                  certificate:
                    description: create a certificate manager certificate (cert-manager
                      required)
                    properties:
                      create:
                        type: boolean
                      dnsNames:
                        description: the hostname / subject alternative names for
                          the certificate
                        items:
                          type: string
                        type: array
                      issuerRef:
                        description: the issuer used to issue the certificate
                        properties:
                          kind:
                            type: string
                          name:
                            type: string
                        type: object
                    type: object
                  faults:
                    description: failure conditions
                    properties:
                      delay:
                        type: boolean
                      error:
                        type: boolean
                      testFail:
                        type: boolean
                      testTimeout:
                        type: boolean
                      unhealthy:
                        type: boolean
                      unready:
                        type: boolean
                    type: object
                  h2c:
                    description: enable h2c protocol (non-TLS version of HTTP/2)
                    properties:
                      enabled:
                        type: boolean
                    type: object
                  host:
                    nullable: true
                    type: string
                  hpa:
                    description: metrics-server add-on required
                    properties:
                      cpu:
                        description: average total CPU usage per pod (1-100)
                        nullable: true
                        type: string
                      enabled:
                        type: boolean
                      maxReplicas:
                        type: integer
                      memory:
                        description: average memory usage per pod (100Mi-1Gi)
                        nullable: true
                        type: string
                      requests:
                        description: average http requests per second per pod (k8s-prometheus-adapter)
                        nullable: true
                        type: string
                    type: object
                  image:
                    properties:
                      pullPolicy:
                        type: string
                      repository:
                        type: string
                      tag:
                        type: string
                    type: object
                  ingress:
                    properties:
                      annotations:
                        type: object
                      className:
                        type: string
                      enabled:
                        type: boolean
                      hosts:
                        description: |-
                          kubernetes.io/ingress.class: nginx
                          kubernetes.io/tls-acme: "true"
                        items:
                          properties:
                            host:
                              type: string
                            paths:
                              items:
                                properties:
                                  path:
                                    type: string
                                  pathType:
                                    type: string
                                type: object
                              type: array
                          type: object
                        type: array
                      tls:
                        items:
                          type: string
                        type: array
                    type: object
                  linkerd:
                    properties:
                      profile:
                        properties:
                          enabled:
                            type: boolean
                        type: object
                    type: object
                  logLevel:
                    type: string
                  nodeSelector:
                    type: object
                  podAnnotations:
                    type: object
                  redis:
                    description: Redis deployment
                    properties:
                      enabled:
                        type: boolean
                      repository:
                        type: string
                      tag:
                        type: string
                    type: object
                  replicaCount:
                    type: integer
                  resources:
                    properties:
                      limits:
                        nullable: true
                        type: string
                      requests:
                        properties:
                          cpu:
                            type: string
                          memory:
                            type: string
                        type: object
                    type: object
                  securityContext:
                    description: set container security context
                    type: object
                  service:
                    description: Kubernetes Service settings
                    properties:
                      annotations:
                        type: object
                      enabled:
                        type: boolean
                      externalPort:
                        type: integer
                      grpcPort:
                        type: integer
                      grpcService:
                        type: string
                      hostPort:
                        description: |-
                          the port used to bind the http port to the host
                          NOTE: requires privileged container with NET_BIND_SERVICE capability -- this is useful for testing
                          in local clusters such as kind without port forwarding
                        nullable: true
                        type: string
                      httpPort:
                        type: integer
                      metricsPort:
                        type: integer
                      nodePort:
                        type: integer
                      type:
                        type: string
                    type: object
                  serviceAccount:
                    properties:
                      enabled:
                        description: Specifies whether a service account should be
                          created
                        type: boolean
                      name:
                        description: |-
                          The name of the service account to use.
                          If not set and create is true, a name is generated using the fullname template
                        nullable: true
                        type: string
                    type: object
                  serviceMonitor:
                    description: create Prometheus Operator monitor
                    properties:
                      additionalLabels:
                        type: object
                      enabled:
                        type: boolean
                      interval:
                        type: string
                    type: object
                  tls:
                    description: enable tls on the podinfo service
                    properties:
                      certPath:
                        description: the path where the certificate key pair will
                          be mounted
                        type: string
                      enabled:
                        type: boolean
                      hostPort:
                        description: |-
                          the port used to bind the tls port to the host
                          NOTE: requires privileged container with NET_BIND_SERVICE capability -- this is useful for testing
                          in local clusters such as kind without port forwarding
                        nullable: true
                        type: string
                      port:
                        description: the port used to host the tls endpoint on the
                          service
                        type: integer
                      secretName:
                        description: the name of the secret used to mount the certificate
                          key pair
                        nullable: true
                        type: string
                    type: object
                  tolerations:
                    items:
                      type: string
                    type: array
                  ui:
                    properties:
                      color:
                        type: string
                      logo:
                        type: string
                      message:
                        type: string
                    type: object
                type: object
              version:
                description: The version of the service. Every change to this field
                  together with the `.spec.values` field creates a new revision of
                  the service.
                type: string
            type: object
        type: object
    served: true
    storage: true
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null

